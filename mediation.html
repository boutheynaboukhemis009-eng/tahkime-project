<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        خدمة الوساطة | TAHKIME
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<section class="visual-hero">

    <div class="hero-box">

        <div class="hero-left">

            <span class="mini-badge">
                خدمة احترافية
            </span>

            <h1>
                الوساطة القانونية الرقمية
            </h1>

            <div class="hero-features">

                <div class="hero-item">
                    🤝 وسطاء متخصصون
                </div>

                <div class="hero-item">
                    🔒 سرية تامة
                </div>

                <div class="hero-item">
                    ⚡ حلول سريعة
                </div>

                <div class="hero-item">
                    🌐 جلسات رقمية
                </div>

            </div>

            <a href="contact.html" class="hero-btn">
                استشارة سريعة
            </a>

        </div>

        <div class="hero-right">
            <img src="mediation.jpg" alt="الوساطة">
        </div>

    </div>

</section>

<section class="cards-section">

    <div class="info-card">
        <div class="card-icon">🤝</div>
        <h3>حلول ودية</h3>
    </div>

    <div class="info-card">
        <div class="card-icon">🔐</div>
        <h3>حماية الخصوصية</h3>
    </div>

    <div class="info-card">
        <div class="card-icon">⚡</div>
        <h3>سرعة التسوية</h3>
    </div>

    <div class="info-card">
        <div class="card-icon">🌍</div>
        <h3>وساطة رقمية</h3>
    </div>

</section>

<section class="timeline-section">

    <div class="timeline-box">
        <div class="timeline-number">1</div>
        <h3>تقديم الطلب</h3>
    </div>

    <div class="timeline-box">
        <div class="timeline-number">2</div>
        <h3>دراسة النزاع</h3>
    </div>

    <div class="timeline-box">
        <div class="timeline-number">3</div>
        <h3>جلسات الوساطة</h3>
    </div>

    <div class="timeline-box">
        <div class="timeline-number">4</div>
        <h3>اتفاق التسوية</h3>
    </div>

</section>

<section class="cta-modern">

    <h2>
        ابدأ الوساطة الآن
    </h2>

    <button class="service-request-btn" data-service-name="وساطة" data-service-type="mediation">طلب الخدمة الآن</button>

</section>

<script src="script.js"></script>
</body>

</html>
