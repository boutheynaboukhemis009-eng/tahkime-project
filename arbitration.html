<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        خدمة التحكيم | TAHKIME
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<section class="visual-hero">

    <div class="hero-box">

        <div class="hero-left">

            <span class="mini-badge">
                خدمة احترافية
            </span>

            <h1>
                التحكيم التجاري الرقمي
            </h1>

            <div class="hero-features">

                <div class="hero-item">
                    ⚖ محكمون معتمدون
                </div>

                <div class="hero-item">
                    🔒 سرية كاملة
                </div>

                <div class="hero-item">
                    ⚡ speed سرعة الإنجاز
                </div>

                <div class="hero-item">
                    🌐 متابعة رقمية
                </div>

            </div>

        </div>

        <div class="hero-right">

            <img src="Arbitral.jpg" alt="التحكيم التجاري">

        </div>

    </div>

    <a href="contact.html" class="hero-btn">استشارة سريعة</a>

</section>

<section class="cards-section">

    <div class="info-card">

        <div class="card-icon">
            ⚖
        </div>

        <h3>
            تحكيم احترافي
        </h3>

    </div>

    <div class="info-card">

        <div class="card-icon">
            🔐
        </div>

        <h3>
            حماية البيانات
        </h3>

    </div>

    <div class="info-card">

        <div class="card-icon">
            ⚡
        </div>

        <h3>
            سرعة المعالجة
        </h3>

    </div>

    <div class="info-card">

        <div class="card-icon">
            🌍
        </div>

        <h3>
            منصة رقمية
        </h3>

    </div>
        
</section>

<section class="timeline-section">

    <div class="timeline-box">

        <div class="timeline-number">
            1
        </div>

        <h3>
            إرسال الطلب
        </h3>

    </div>

    <div class="timeline-box">

        <div class="timeline-number">
            2
        </div>

        <h3>
            دراسة الملف
        </h3>

    </div>

    <div class="timeline-box">

        <div class="timeline-number">
            3
        </div>

        <h3>
            جلسات التحكيم
        </h3>

    </div>

    <div class="timeline-box">

        <div class="timeline-number">
            4
        </div>

        <h3>
            إصدار القرار
        </h3>

    </div>

</section>

<section class="cta-modern">

    <h2>
        ابدأ خدمتك الآن
    </h2>

    <button class="service-request-btn" data-service-name="التحكيم التجاري" data-service-type="arbitration">طلب الخدمة الآن</button>

</section>

<script src="script.js"></script>
</body>

</html>
