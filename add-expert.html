<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة خبير - منصة تحكيم</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
     <nav class="navbar">
        <div class="brand-container">
            <img src="logo.jpg" class="logo-img" alt="Logo">
            <div class="brand-text-container">
                <span class="logo-text-ar">تحكيم</span>
                <span class="logo-text-en">TAHKIME</span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="experts.html">الخبراء</a></li>
            <li><a href="service.html">الخدمات</a></li>
            <li><a href="partner.html">الشركاء</a></li>
        </ul>
    </nav>

    <main class="auth-page">
        <h1 class="page-title">إضافة خبير جديد</h1>
        
        <form id="addExpertForm" class="signup-form">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="name" placeholder="اسم الخبير" required>
            </div>

            <div class="form-group">
                <label>التخصص</label>
                <input type="text" id="specialization" placeholder="محامٍ / محكم / موثق" required>
            </div>

            <div class="form-group">
                <label>رقم الرخصة</label>
                <input type="text" id="license_number" placeholder="أدخل رقم الرخصة">
            </div>

            <div class="form-group">
                <label>نبذة عن الخبير</label>
                <textarea id="bio" placeholder="اكتب نبذة مختصرة..." style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
            </div>

            <button type="submit" class="auth-btn">حفظ الخبير</button>
        </form>
    </main>

    <script src="js/script.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof protectPage === 'function') {
                protectPage(['admin']);
            } else {
                console.error("خطأ: ملف script.js لم يتم تحميله بشكل صحيح أو يحتوي على خطأ برمجي يمنع تشغيله.");
            }
        });
    </script>

</body>
</html>
