<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - منصة تحكيم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-page">
        <h1 class="page-title">تسجيل الدخول</h1>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>رقم التعريف / السجل التجاري</label>
                <input type="text" id="idNumber" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>نوع الحساب</label>
                <select id="loginType">
                    <option value="client">فرد</option>
                    <option value="company">مؤسسة / شركة</option>
                    <option value="expert">خبير / محكم</option>
                    <option value="admin">مدير</option>
                </select>
            </div>
            <div class="auth-switch" style="text-align: center; margin-top: 15px; font-size: 14px;">
                <button type="submit" class="auth-btn">دخول</button>
                <br><br>
                <span>ليس لديك حساب؟ </span>
                <a href="register.html" style="color: #007bff; text-decoration: none; font-weight: bold;">إنشاء حساب جديد</a>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
